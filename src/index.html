<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Countdown Manager — Track your most important events with live countdowns" />
  <title>Countdown Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="page">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header__icon" aria-hidden="true">⏳</div>
      <div>
        <h1 class="header__title">Countdown Manager</h1>
        <p class="header__sub">Never miss a moment that matters.</p>
      </div>
    </header>

    <!-- ── Add Event Form ── -->
    <section class="form-card" aria-labelledby="form-heading">
      <h2 class="form-card__heading" id="form-heading">Add a New Event</h2>
      <form class="form" id="event-form" novalidate>
        <div class="form__row">

          <div class="form__field">
            <label class="form__label" for="input-label">Event Name</label>
            <input class="form__input" type="text" id="input-label" name="label"
              placeholder="e.g. New Year, Product Launch…" maxlength="60" autocomplete="off" spellcheck="false"
              required />
            <span class="form__error" id="err-label" role="alert" aria-live="assertive"></span>
          </div>

          <div class="form__field">
            <label class="form__label" for="input-datetime">Date &amp; Time</label>
            <input class="form__input form__input--dt" type="datetime-local" id="input-datetime" name="datetime"
              required />
            <span class="form__error" id="err-datetime" role="alert" aria-live="assertive"></span>
          </div>

          <div class="form__field form__field--btn">
            <label class="form__label form__label--hidden" aria-hidden="true">&nbsp;</label>
            <button class="btn btn--add" type="submit" id="btn-add">
              <svg class="btn__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              Add Event
            </button>
          </div>

        </div>
      </form>
    </section>

    <!-- ── Event Cards ── -->
    <section class="cards-section" aria-labelledby="cards-heading">
      <div class="cards-section__header">
        <h2 class="cards-section__heading" id="cards-heading">Your Countdowns</h2>
        <span class="cards-section__badge" id="event-count" aria-live="polite">0</span>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" aria-live="polite">
        <div class="empty-state__icon" aria-hidden="true">🎯</div>
        <p class="empty-state__text">No countdowns yet. Add your first event above!</p>
      </div>

      <!-- Cards list -->
      <ul class="cards-list" id="cards-list" role="list" aria-label="Countdown events">
        <!-- Dynamically injected -->
      </ul>
    </section>

  </div><!-- /page -->

  <!-- ── Delete Confirm Dialog ── -->
  <div class="overlay" id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title" hidden>
    <div class="dialog" id="confirm-dialog">
      <p class="dialog__icon" aria-hidden="true">🗑️</p>
      <h2 class="dialog__title" id="confirm-title">Delete Event?</h2>
      <p class="dialog__desc" id="confirm-desc">This cannot be undone.</p>
      <div class="dialog__actions">
        <button class="btn btn--ghost" id="btn-cancel-del">Cancel</button>
        <button class="btn btn--danger" id="btn-confirm-del">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
